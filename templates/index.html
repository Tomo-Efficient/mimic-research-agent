<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RWD Research Agent</title>
<style>
:root{--bg:#f7f8fa;--surface:#fff;--border:#e5e7eb;--text:#1f2937;--text2:#6b7280;--text3:#9ca3af;--primary:#2563eb;--primary-light:#eff6ff;--success:#059669;--success-light:#ecfdf5;--warning:#d97706;--warning-light:#fffbeb;--danger:#dc2626;--danger-light:#fef2f2;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:20px;background:linear-gradient(180deg,#f0f4ff,#f7f8fa)}
.landing h1{font-size:28px;font-weight:800;margin-bottom:8px}
.landing p{color:var(--text2);font-size:15px;margin-bottom:24px}
.landing-wrap{width:100%;max-width:640px;display:flex;gap:8px}
.landing-wrap input{flex:1;padding:14px 18px;border:2px solid var(--border);border-radius:14px;font-size:15px;font-family:inherit;outline:none;transition:all .2s}
.landing-wrap input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.landing-wrap button{padding:14px 24px;border-radius:14px;border:none;background:var(--primary);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.landing-wrap button:hover{background:#1d4ed8}
.landing-wrap button:disabled{opacity:.4}
.mode-row{display:flex;gap:8px;margin-top:12px}
.mode-row button{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;cursor:pointer;font-family:inherit;color:var(--text2);transition:all .2s}
.mode-row button.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.workspace{display:none;height:100vh;grid-template-columns:250px 1fr 6px 700px}
.workspace.on{display:grid}
.panel-left{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.panel-left h3{padding:16px;border-bottom:1px solid var(--border);font-size:14px}
#conv-list div:hover .conv-del{display:inline!important}
#conv-list div .conv-del:hover{background:#fee2e2;color:var(--danger)}
.panel-center{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.panel-center h3{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);font-size:14px;flex-shrink:0}
.chat-area{flex:1;overflow-y:auto;padding:20px}
.msg{margin-bottom:16px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user .bubble{background:var(--primary-light);margin-left:auto;max-width:80%;width:fit-content}
.msg.agent .bubble{background:var(--surface);border:1px solid var(--border);max-width:85%}
.bubble{padding:12px 16px;border-radius:var(--radius);font-size:14px;line-height:1.6;box-shadow:var(--shadow)}
.bubble.step{background:#f9fafb;border:1px dashed var(--border);font-size:13px;color:var(--text2)}
.bubble.done{background:var(--success-light);border-color:#a7f3d0;font-size:13px}
.bubble .label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:600}
.chat-bar{display:flex;gap:8px;padding:16px 20px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;align-items:flex-end}
.chat-bar input{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;outline:none}
.chat-bar input:focus{border-color:var(--primary)}
.chat-bar button{padding:12px 24px;border-radius:12px;border:none;background:var(--primary);color:#fff;font-weight:600;cursor:pointer}

.resizer{width:6px;cursor:col-resize;flex-shrink:0}
.resizer:hover{background:var(--primary)}

.panel-right{background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.panel-right .tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-right .tabs button{flex:1;padding:12px 4px;border:none;background:none;font-size:11px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;font-family:inherit;transition:all .2s}
.panel-right .tabs button:hover{color:var(--text2)}
.panel-right .tabs button.on{color:var(--primary);border-bottom-color:var(--primary)}
.panel-right .r-content{flex:1;overflow-y:auto;padding:20px;font-size:13px;line-height:1.7}
.panel-right .r-content h2{font-size:16px;margin-bottom:12px}
.panel-right .r-content h3{font-size:14px;margin:16px 0 8px}
.panel-right .r-content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.panel-right .r-content td,.panel-right .r-content th{padding:6px 10px;border-bottom:1px solid #f3f4f6;text-align:left}
.panel-right .r-content th{background:#f9fafb;font-weight:700;font-size:11px;color:var(--text2)}
.empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:14px}

.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.hint{text-align:center;margin:12px 0;font-size:13px;color:var(--text2);padding:10px;background:var(--primary-light);border-radius:8px}

@media(max-width:1000px){.workspace{grid-template-columns:1fr!important}.panel-left,.panel-right,.resizer{display:none}}
</style>
</head>
<body>

<!-- LANDING -->
<div class="landing" id="landing">
  <h1>RWD Research Agent</h1>
  <p>基于真实世界数据的临床研究智能助手</p>
  <div class="landing-wrap">
    <input id="landing-input" placeholder="输入研究想法/AI自动探索" onkeydown="if(event.key==='Enter')send()">
    <button id="landing-btn" onclick="send()">发送</button>
  </div>
  <div class="mode-row">
    <button class="active" data-mode="ai_assisted" onclick="setMode(this)">使用平台数据</button>
    <button data-mode="paper_reproduction" onclick="setMode(this)">上传数据</button>
  </div>
</div>

<!-- WORKSPACE -->
<div class="workspace" id="workspace">
  <div class="panel-left">
    <h3 style="display:flex;justify-content:space-between;align-items:center">对话记录 <button onclick="newConv()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text2);padding:0 4px" title="新对话">+</button></h3>
    <div id="conv-list" style="flex:1;overflow-y:auto;padding:8px"></div>
  </div>
  <div class="panel-center">
    <h3>RWD Research Agent <span style="font-size:11px;color:var(--text3);margin-left:8px" id="status">就绪</span></h3>
    <div class="chat-area" id="chat"></div>
    <div class="chat-bar">
      <input id="chat-input" placeholder="输入指令继续..." onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()">发送</button>
    </div>
  </div>
  <div class="resizer" id="resizer"></div>
  <div class="panel-right" id="right-panel">
    <div class="tabs">
      <button class="on" data-r="eda" onclick="switchTab('eda')">EDA</button>
      <button data-r="ideas" onclick="switchTab('ideas')">选题</button>
      <button data-r="cohort" onclick="switchTab('cohort')">队列</button>
      <button data-r="stats" onclick="switchTab('stats')">统计</button>
      <button data-r="manuscript" onclick="switchTab('manuscript')">报告</button>
    </div>
    <div class="r-content" id="r-content"><div class="empty">报告将在此处展示</div></div>
  </div>
</div>

<script>
// ====== STATE ======
let mode = 'ai_assisted';
let currentTab = 'eda';
let reports = {};
let convId = '';

const CONV_KEY = 'mimic_agent_convos';
function loadConvs() { try{return JSON.parse(localStorage.getItem(CONV_KEY)||'[]')}catch(e){return[]} }
function saveConvs(c) { try{localStorage.setItem(CONV_KEY,JSON.stringify(c))}catch(e){} }

function saveConv() {
  if (!convId) return;
  let convs = loadConvs();
  let c = convs.find(x => x.id === convId);
  if (!c) { c = {id: convId}; convs.unshift(c); }
  c.title = c.title || '新对话';
  c.mode = mode;
  c.reports = reports;
  c.chatHtml = document.getElementById('chat').innerHTML;
  c.time = Date.now();
  saveConvs(convs);
}

function renderConvs() {
  const convs = loadConvs();
  const list = document.getElementById('conv-list');
  list.innerHTML = convs.slice(0, 30).map(c =>
    `<div onclick="switchConv('${c.id}')" style="padding:10px;border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;${c.id===convId?'background:var(--primary-light);color:var(--primary);font-weight:600':'color:var(--text2)'}"><div><div>${c.title||'新对话'}</div><div style="font-size:10px;color:var(--text3)">${new Date(c.time).toLocaleTimeString()}</div></div><span onclick="event.stopPropagation();deleteConv('${c.id}')" style="font-size:16px;color:var(--text3);padding:2px 6px;border-radius:4px;display:none" class="conv-del">×</span></div>`
  ).join('') || '<div style="padding:10px;color:var(--text3);font-size:12px">暂无对话</div>';
}

function deleteConv(id) {
  let convs = loadConvs();
  convs = convs.filter(c => c.id !== id);
  saveConvs(convs);
  if (convId === id) newConv();
  renderConvs();
}

function newConv() {
  saveConv();
  convId = 'c'+Date.now();
  reports = {}; currentTab = 'eda';
  document.getElementById('chat').innerHTML = '';
  document.getElementById('r-content').innerHTML = '<div class="empty">报告将在此处展示</div>';
  document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('on', b.dataset.r === 'eda'));
  document.getElementById('status').textContent = '就绪 — 新对话';
  renderConvs();
}

function switchConv(id) {
  saveConv();
  let convs = loadConvs();
  let c = convs.find(x => x.id === id);
  if (!c) return;
  convId = c.id;
  mode = c.mode || 'ai_assisted';
  reports = c.reports || {};
  currentTab = 'eda';
  document.getElementById('chat').innerHTML = c.chatHtml || '';
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
  document.getElementById('landing').style.display = 'none';
  document.getElementById('workspace').classList.add('on');
  document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('on', b.dataset.r === 'eda'));
  renderReport();
  renderConvs();
  document.getElementById('status').textContent = '就绪';
}

setInterval(saveConv, 5000);
window.addEventListener('beforeunload', saveConv);

// ====== MODE ======
function setMode(btn) {
  document.querySelectorAll('.mode-row button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  mode = btn.dataset.mode;
}

// ====== SEND ======
async function send() {
  const onLanding = document.getElementById('landing').style.display !== 'none';
  const inp = document.getElementById(onLanding ? 'landing-input' : 'chat-input');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';

  if (onLanding) {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('workspace').classList.add('on');
    convId = 'c' + Date.now();
    // Set title from first message
    let convs = loadConvs();
    convs.unshift({id: convId, title: msg.substring(0, 20), mode: mode, time: Date.now()});
    saveConvs(convs);
    renderConvs();
  }

  addMsg('user', msg);
  document.getElementById('status').textContent = '分析中...';

  // Find which skill to run
  let skill = 'skill1';
  if (reports.eda && !reports.ideas) skill = 'skill2';
  else if (reports.ideas && !reports.cohort) skill = 'skill3';
  else if (reports.cohort && !reports.stats) skill = 'skill4';
  else if (reports.stats && !reports.manuscript) skill = 'skill5';
  else if (!reports.eda) skill = 'skill1';
  else if (!reports.ideas) skill = 'skill2';
  else if (!reports.cohort) skill = 'skill3';
  else if (!reports.stats) skill = 'skill4';
  else if (!reports.manuscript) skill = 'skill5';

  await streamSkill(skill);
  showHint();
}

// ====== ADD CHAT MESSAGE ======
function addMsg(role, text) {
  const cls = role === 'user' ? 'user' : 'agent';
  document.getElementById('chat').innerHTML +=
    `<div class="msg ${cls}"><div class="bubble">${text}</div></div>`;
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function addStreamMsg(text) {
  // Add a streaming-type message that we'll update
  const id = 'stream-' + Date.now();
  document.getElementById('chat').innerHTML +=
    `<div class="msg agent" id="${id}"><div class="bubble">${text}</div></div>`;
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
  return id;
}

function updateStreamMsg(id, html) {
  const el = document.getElementById(id);
  if (el) { el.querySelector('.bubble').innerHTML = html; }
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

// ====== STREAM SKILL ======
async function streamSkill(skill) {
  const streamId = addStreamMsg('<span class="spin"></span> 准备中...');

  try {
    const resp = await fetch('/api/stream-pipeline', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({skill: skill, mode: mode, message: 'run'})
    });

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    let html = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(line.slice(6));
          if (d.event === 'skill_start') {
            html += `<div class="label">${d.message}</div>`;
          } else if (d.event === 'step') {
            html += `<div class="bubble step"><span class="spin"></span> ${d.message}</div>`;
          } else if (d.event === 'skill_complete') {
            html = html.replace(/<span class="spin"><\/span>/g, '✅');
            html = html.replace(/正在/g, '已完成：');
            html += `<div class="bubble done">✅ ${d.message}</div>`;
            if (d.skill === 'skill1' && d.data) reports.eda = d.data;
            if (d.skill === 'skill2' && d.data) reports.ideas = d.data;
            if (d.skill === 'skill3' && d.data) reports.cohort = d.data;
            if (d.skill === 'skill4' && d.data) reports.stats = d.data;
            if (d.skill === 'skill5') reports.manuscript = d.data?.manuscript || '';
            renderReport();
          } else if (d.event === 'pipeline_complete') {
            html = html.replace(/<span class="spin"><\/span>/g, '✅');
            html += `<div class="bubble done">${d.message}</div>`;
          } else if (d.event === 'error') {
            html += `<div class="bubble" style="background:var(--danger-light);border-color:#fecaca;">❌ ${d.message}</div>`;
          }
        } catch(e) {}
      }
      updateStreamMsg(streamId, html || '<span class="spin"></span> 处理中...');
    }
    updateStreamMsg(streamId, html || '✅ 完成');
    document.getElementById('status').textContent = '就绪';
  } catch(e) {
    updateStreamMsg(streamId, '❌ 连接失败: ' + e.message);
    document.getElementById('status').textContent = '错误';
  }
}

function showHint() {
  let h = '';
  if (reports.eda && !reports.ideas) h = '💡 数据探索完成。输入 <b>生成选题</b> 继续，或在右侧面板查看报告。';
  else if (reports.ideas && !reports.cohort) h = '💡 选题就绪。在右侧 <b>选题</b> 标签中选择一个题目，点击 <b>选择并检验</b> 开始提取队列。';
  else if (reports.cohort && !reports.stats) h = '💡 队列提取完成。输入 <b>统计检验</b> 继续，或在右侧面板查看队列。';
  else if (reports.stats && !reports.manuscript) h = '💡 统计完成。输入 <b>生成报告</b> 继续。';
  else if (reports.manuscript) h = '🎉 全流程完成！查看右侧报告面板。';
  if (h) document.getElementById('chat').innerHTML += `<div class="hint">${h}</div>`;
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

// ====== REPORTS ======
function switchTab(r) {
  currentTab = r;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('on', b.dataset.r === r));
  renderReport();
}

function renderReport() {
  const el = document.getElementById('r-content');
  const d = reports[currentTab];
  if (!d) { el.innerHTML = '<div class="empty">尚未生成</div>'; return; }

  if (currentTab === 'eda') {
    const s = d.summary || {};
    let h = `<h2>📊 数据质量报告</h2>`;
    h += `<p><strong>数据目录:</strong> ${d.data_directory||'N/A'}</p>`;
    h += `<p><strong>数据表:</strong> ${d.tables_found} 张 | <strong>患者数:</strong> ${(d.total_patients_estimate||0).toLocaleString()}</p>`;
    h += `<p><strong>已分析字段:</strong> ${s.total_columns_analyzed||0} | <strong>可用变量:</strong> ${s.usable_variables||0} | <strong>谨慎变量:</strong> ${s.cautious_variables||0}</p>`;

    // Table relationships
    const rels = d.relationships || [];
    if (rels.length > 0) {
      h += `<h3>🔗 表间关系 (${rels.length})</h3><table><tr><th>表A</th><th>表B</th><th>共享主键</th></tr>`;
      rels.slice(0,15).forEach(r => h += `<tr><td>${r.left}</td><td>${r.right}</td><td>${(r.shared_keys||[]).join(', ')}</td></tr>`);
      h += `</table>`;
    }

    // Per-table details
    (d.table_reports||[]).forEach(tr => {
      h += `<h3>📋 ${tr.table} <span style="font-size:11px;color:var(--text2)">${(tr.n_rows||0).toLocaleString()} 行 × ${tr.n_cols||0} 列${tr.is_sample?' (采样)':''}</span></h3>`;
      const cols = tr.columns || [];
      if (cols.length > 0) {
        h += `<table><tr><th>列名</th><th>类型</th><th>缺失率</th><th>评级</th><th>唯一值</th><th>中位数/均值</th></tr>`;
        cols.slice(0, 20).forEach(c => {
          const lvl = c.missing_level || '?';
          const lvlColor = lvl==='usable'?'var(--success)':(lvl==='cautious'?'var(--warning)':'var(--danger)');
          const statsStr = c.stats ? `中位:${c.stats.median||'?'} / 均值:${c.stats.mean||'?'}` : '';
          h += `<tr><td><strong>${c.name}</strong></td><td>${c.dtype||'?'}</td><td>${((c.missing_frac||0)*100).toFixed(1)}%</td><td style="color:${lvlColor};font-weight:700">${lvl}</td><td>${c.unique_values||0}</td><td style="font-size:11px">${statsStr}</td></tr>`;
        });
        if (cols.length > 20) h += `<tr><td colspan="6" style="color:var(--text3)">... 还有 ${cols.length-20} 列</td></tr>`;
        h += `</table>`;
      }
      // Excluded columns
      const excluded = tr.excluded_columns || [];
      if (excluded.length > 0) h += `<p style="color:var(--danger);font-size:12px;">⚠ 排除列 (${excluded.length}): ${excluded.join(', ')}</p>`;
    });

    // Key clinical variables
    const kv = s.key_clinical_variables || [];
    if (kv.length > 0) {
      h += `<h3>🔬 关键临床变量 (${kv.length})</h3><table><tr><th>变量</th><th>缺失率</th><th>评级</th><th>中位数</th></tr>`;
      kv.slice(0,30).forEach(v => h += `<tr><td>${v.variable||'?'}</td><td>${((v.missing_frac||0)*100).toFixed(1)}%</td><td>${v.missing_level||'?'}</td><td>${v.stats?.median||'N/A'}</td></tr>`);
      h += `</table>`;
    }

    // LLM analysis
    if (d.llm_analysis) {
      h += `<h3>🤖 AI 分析</h3>`;
      if (d.llm_analysis.quality_narrative) h += `<p>${d.llm_analysis.quality_narrative}</p>`;
      if (d.llm_analysis.relationship_notes) h += `<p>${d.llm_analysis.relationship_notes}</p>`;
    }

    el.innerHTML = h;

  } else if (currentTab === 'ideas') {
    const items = d.ideas || d.papers || [];
    const isPaper = !!d.papers;
    const total = d.total_ideas || items.length;
    const offset = d.batch_offset || 0;
    let h = `<h2>💡 ${isPaper?'候选论文':'研究选题'}</h2>`;
    h += `<p>${items.length} 个候选 (共 ${total} 个) | 第 ${Math.floor(offset/10)+1} 批</p>`;
    h += `<button onclick="shuffleIdeas()" style="margin-bottom:12px;padding:8px 20px;border-radius:8px;border:1px solid var(--primary);background:var(--surface);color:var(--primary);font-size:13px;cursor:pointer;font-weight:600;transition:all .2s">🔄 换一批</button>`;
    items.forEach((item, i) => {
      const titleText = item.title_cn || item.title || item.title_en || '';
      const hypText = item.hypothesis_cn || item.hypothesis || item.hypothesis_en || '';
      const scores = item.scores || {};
      h += `<div style="margin:10px 0;padding:12px;background:#f9fafb;border-radius:8px;border:1px solid var(--border);cursor:pointer" onclick="selectIdea('${item.id}','${titleText.replace(/'/g,"\\'").substring(0,60)}')">`;
      h += `<strong style="font-size:14px">${item.id||('#'+(i+1))}</strong> `;
      if (item.total_score) h += `<span style="color:var(--success);font-weight:700;font-size:14px">★ ${item.total_score}</span> `;
      if (isPaper) h += `<span style="color:var(--warning);font-size:11px">${item.journal||''} (${item.year||''})</span>`;
      h += `<div style="font-size:13px;font-weight:600;margin:4px 0">${titleText.substring(0,120)}</div>`;
      h += `<div style="font-size:12px;color:var(--text2)">${(hypText||item.key_findings||'').substring(0,200)}</div>`;
      if (item.suggested_method) h += `<div style="font-size:11px;color:var(--text3);margin-top:2px">方法: ${item.suggested_method.substring(0,80)}</div>`;
      if (!isPaper && Object.keys(scores).length > 0) {
        h += `<div style="display:flex;gap:10px;margin-top:8px;font-size:10px;color:var(--text3)">`;
        h += `<span>创新性: <b style="color:var(--primary)">${scores.innovation||'-'}</b></span>`;
        h += `<span>可验证: <b style="color:var(--primary)">${scores.data_verifiability||'-'}</b></span>`;
        h += `<span>临床: <b style="color:var(--primary)">${scores.clinical_significance||'-'}</b></span>`;
        h += `<span>可行: <b style="color:var(--primary)">${scores.statistical_feasibility||'-'}</b></span>`;
        h += `<span>发表: <b style="color:var(--primary)">${scores.publication_potential||'-'}</b></span>`;
        h += `<span>风险: <b style="color:var(--primary)">${scores.risk||'-'}</b></span>`;
        h += `</div>`;
      }
      h += `<button style="margin-top:8px;padding:6px 16px;border-radius:6px;border:1px solid var(--primary);background:var(--primary);color:#fff;font-size:12px;cursor:pointer;font-weight:600" onclick="event.stopPropagation();selectIdea('${item.id}','${titleText.replace(/'/g,"\\'").substring(0,60)}')">选择并提取队列 →</button>`;
      h += `</div>`;
    });
    el.innerHTML = h;

  } else if (currentTab === 'cohort') {
    const steps = d.steps || [];
    const funnel = d.funnel || {};
    let h = `<h2>📦 研究队列</h2>`;
    h += `<p><strong>研究:</strong> ${d.idea_title||'N/A'}</p>`;
    h += `<p><strong>最终队列:</strong> ${(d.final_cohort_size||0).toLocaleString()} 名患者 | <strong>变量数:</strong> ${d.n_columns||0}</p>`;
    if (d.variables_included && d.variables_included.length > 0) {
      h += `<p><strong>已提取变量:</strong> ${d.variables_included.join(', ')}</p>`;
    }
    if (d.variables_not_found && d.variables_not_found.length > 0) {
      h += `<p style="color:var(--danger)"><strong>未找到变量:</strong> ${d.variables_not_found.join(', ')}</p>`;
    }
    if (d.warnings && d.warnings.length > 0) {
      d.warnings.forEach(w => h += `<p style="color:var(--warning)">⚠ ${w}</p>`);
    }
    if (d.output_file) {
      h += `<p style="font-size:11px;color:var(--text3)">输出: ${d.output_file}</p>`;
    }
    // Funnel steps table
    if (steps.length > 0) {
      h += `<h3>📊 筛选漏斗</h3><table><tr><th>步骤</th><th>患者数</th></tr>`;
      steps.forEach(s => h += `<tr><td>${s.description||''}</td><td>${(s.count||0).toLocaleString()}</td></tr>`);
      h += `</table>`;
    }
    el.innerHTML = h;

  } else if (currentTab === 'stats') {
    const results = d.results || [];
    let h = `<h2>📈 统计检验报告</h2>`;
    h += `<p><strong>研究假设:</strong> ${d.hypothesis||'N/A'}</p>`;
    h += `<p><strong>样本量:</strong> ${(d.sample_size||0).toLocaleString()} | <strong>检验项:</strong> ${results.length}</p>`;
    h += '<table><tr><th>分析项</th><th>方法</th><th>N</th><th>效应量</th><th>p值</th><th>显著性</th></tr>';
    results.forEach(r => {
      let eff = '-';
      if (r.odds_ratio) eff = `OR=${r.odds_ratio}`;
      else if (r.pearson_r !== undefined) eff = `r=${r.pearson_r}`;
      const sigTag = r.significant ? '<span style="color:var(--danger);font-weight:700">● 显著</span>' : '<span style="color:var(--text3)">○ 不显著</span>';
      h += `<tr><td><strong>${r.label||'?'}</strong></td><td>${(r.method||'').substring(0,25)}</td><td>${r.n||'-'}</td><td>${eff}</td><td>p=${r.p_value||'N/A'}</td><td>${sigTag}</td></tr>`;
    });
    h += '</table>';
    // Group comparisons
    results.filter(r => r.group0_median !== undefined).forEach(r => {
      h += `<div style="margin:8px 0;padding:10px;background:#f9fafb;border-radius:8px">`;
      h += `<strong>${r.label}</strong><br>`;
      h += `幸存组中位数: <b>${r.group0_median}</b> vs 死亡组: <b>${r.group1_median}</b> | p=${r.p_value}`;
      if (r.odds_ratio) h += `<br>OR = ${r.odds_ratio} (95% CI: ${(r.or_95ci||[]).join(', ')})`;
      h += `</div>`;
    });
    if (d.interpretation) {
      h += `<h3>📋 结果解读</h3><div style="white-space:pre-wrap;line-height:1.8">${d.interpretation.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'<br><br>').replace(/^- (.+)$/gm,'• $1')}</div>`;
    }
    el.innerHTML = h;

  } else if (currentTab === 'manuscript') {
    const md = typeof d === 'string' ? d : (d.manuscript || '');
    const html = md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^---$/gm,'<hr>').replace(/\n\n/g,'<br><br>');
    el.innerHTML = `<h2>📄 研究报告</h2><div style="white-space:pre-wrap;line-height:1.8">${html}</div>`;
  }
}

// ====== SHUFFLE IDEAS ======
async function shuffleIdeas() {
  try {
    const resp = await fetch('/api/ideas/shuffle', {method: 'POST'});
    const data = await resp.json();
    if (data.ideas) {
      reports.ideas = data;
      switchTab('ideas');
    }
  } catch(e) {
    console.error('shuffle failed', e);
  }
}

// ====== IDEA SELECTION (from right panel) ======
async function selectIdea(id, title) {
  // Echo in chat
  document.getElementById('chat').innerHTML +=
    `<div class="msg user"><div class="bubble">已选择: <strong>${id}</strong> — ${title}</div></div>`;
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;

  // Save selection on backend
  try {
    await fetch('/api/skill2/select-idea', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({idea_id: id})
    });
  } catch(e) {}

  // Switch to cohort tab and run Skill Cohort
  switchTab('cohort');
  document.getElementById('status').textContent = '提取研究队列...';
  await streamSkill('skill3');
  showHint();
}

renderConvs();

// ====== RESIZER ======
(function(){
  const r = document.getElementById('resizer');
  const ws = document.getElementById('workspace');
  let sx, sw;
  r.onmousedown = e => { sx = e.clientX; sw = document.getElementById('right-panel').offsetWidth; r.classList.add('on'); document.body.style.cursor='col-resize'; };
  document.onmousemove = e => { if(!sx) return; ws.style.gridTemplateColumns = `250px 1fr 6px ${Math.max(400,Math.min(900,sw+sx-e.clientX))}px`; };
  document.onmouseup = () => { sx = null; r.classList.remove('on'); document.body.style.cursor=''; };
})();
</script>
